databaseChangeLog:
  - changeSet:
      id: 1
      author: titanium
      changes:
        - createTable:
            tableName: inventarios
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: producto_id
                  type: BIGINT
              - column:
                  name: stock
                  type: INT
              - column:
                  name: stock_minimo
                  type: INT
              - column:
                  name: ubicacion
                  type: VARCHAR(100)

  - changeSet:
      id: 2
      author: titanium
      changes:
