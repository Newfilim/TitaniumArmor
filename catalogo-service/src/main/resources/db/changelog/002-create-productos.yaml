databaseChangeLog:

  - changeSet:
      id: 2
      author: cristopher

      changes:

        - createTable:
            tableName: productos

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nombre
                  type: VARCHAR(100)

                  constraints:
                    nullable: false

              - column:
                  name: descripcion
                  type: VARCHAR(255)

              - column:
                  name: precio
                  type: DOUBLE

                  constraints:
                    nullable: false

              - column:
                  name: marca
                  type: VARCHAR(100)

                  constraints:
                    nullable: false

              - column:
                  name: categoria_id
                  type: BIGINT

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: productos
            baseColumnNames: categoria_id
            referencedTableName: categorias
            referencedColumnNames: id
            constraintName: fk_producto_categoria